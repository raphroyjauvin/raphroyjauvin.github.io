<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Stage 1: Raw data -->
<rect x="150" y="40" width="340" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="320" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Raw municipal data</text>
<text x="320" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Open data, city GIS exports</text>

<!-- Arrow 1→2 -->
<line x1="320" y1="96" x2="320" y2="144" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 2: Spatial processing — QGIS -->
<rect x="150" y="148" width="340" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="320" y="168" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Spatial processing — QGIS</text>
<text x="320" y="190" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Selections, dissolves, clips,</text>
<text x="320" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">buffers, manual repairs</text>

<!-- Arrow 2→3 -->
<line x1="320" y1="228" x2="320" y2="276" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 3: Attribute processing — ArcGIS / ArcPy -->
<rect x="150" y="280" width="340" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="320" y="298" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Attribute processing — ArcGIS / ArcPy</text>
<text x="320" y="318" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Custom Python tools, 98%+ gap fill</text>

<!-- Arrow 3→4 -->
<line x1="320" y1="336" x2="320" y2="384" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 4: Spatial validation — QGIS -->
<rect x="150" y="388" width="340" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="320" y="406" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Spatial validation — QGIS</text>
<text x="320" y="426" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Geometry checks, mesh testing</text>

<!-- Arrow 4→5 -->
<line x1="320" y1="444" x2="320" y2="492" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Stage 5: Output -->
<rect x="150" y="496" width="340" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="320" y="514" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#173404">Simulation-ready output</text>
<text x="320" y="534" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">Hydraulic model input</text>

<!-- Feedback loop -->
<path d="M150 416 L90 416 L90 188 L146 188" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="76" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A" transform="rotate(-90, 76, 306)">Iterative refinement</text>

</svg>
